<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#41A247" />
      <stop offset="100%" stop-color="#1B4D20" />
    </linearGradient>
    <linearGradient id="boatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F29F05" />
      <stop offset="100%" stop-color="#F25C05" />
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Left Icon Group (MongoDB Leaf as a Boat Sail with phpMyAdmin vibes) -->
  <g transform="translate(15, 20)" filter="url(#shadow)">
    <!-- Sail (MongoDB Leaf styled as a sail) -->
    <path d="M 50 5 C 75 25 90 50 85 70 C 80 85 65 95 50 97 C 35 95 20 85 15 70 C 10 50 25 25 50 5 Z" fill="url(#leafGrad)" />
    <!-- Dynamic leaf accent line -->
    <path d="M 50 5 Q 35 50 50 97" fill="none" stroke="#A3E4A6" stroke-width="2.5" opacity="0.6"/>
    <!-- Internal smaller leaf detail -->
    <path d="M 50 45 C 65 55 70 70 65 80 C 60 87 53 90 50 91 C 47 90 40 87 35 80 C 30 70 35 55 50 45 Z" fill="#4BBA51" opacity="0.8" />
    
    <!-- Boat Hull (phpMyAdmin styled) -->
    <path d="M 5 80 C 25 105 75 105 95 80 L 85 72 C 70 88 30 88 15 72 Z" fill="url(#boatGrad)" />
  </g>

  <!-- Right Text Group (phpMyAdmin typography layout adapted) -->
  <g transform="translate(130, 65)">
    <!-- Primeira linha: mongoDB -->
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-1">
      <tspan fill="#47A248">mongo</tspan><tspan fill="#F25C05">DB</tspan>
    </text>
    <!-- Segunda linha: Admin -->
    <text y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="600" letter-spacing="-1" fill="#6b7280">
      Admin
    </text>
  </g>
</svg>
