name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `MongoDB Admin v${{ steps.get_version.outputs.VERSION }}`,
              draft: true,
              prerelease: false,
              body: `## MongoDB Admin v${{ steps.get_version.outputs.VERSION }}\n\nSee the assets below to download the installer for your platform.`
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos_aarch64
            ext: dmg

          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos_x86_64
            ext: dmg

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows_x86_64
            ext: msi

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux_x86_64
            ext: AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      - name: Rename and upload artifact
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          TARGET=${{ matrix.target }}
          EXT=${{ matrix.ext }}
          SUFFIX=${{ matrix.artifact_suffix }}

          # Localiza o arquivo gerado pelo Tauri
          FILE=$(find src-tauri/target/$TARGET/release/bundle -name "*.$EXT" | head -1)

          if [ -z "$FILE" ]; then
            echo "❌ Arquivo .$EXT não encontrado"
            exit 1
          fi

          DEST="mongodb-admin_${VERSION}_${SUFFIX}.${EXT}"
          cp "$FILE" "$DEST"
          echo "✅ Gerado: $DEST"

          # Upload para a Release
          gh release upload "v${VERSION}" "$DEST" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release (remove draft)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
